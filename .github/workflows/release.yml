name: Build Ramadan Snake Native Apps

on:
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: 1. Download Code from Repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 21 Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Compile and Build JAR
        run: |
          mkdir -p out/production
          mkdir -p out/artifacts
          javac -encoding UTF-8 -d out/production src/*.java
          cp -r resources/sounds out/production/
          cp -r resources/t3b2a out/production/
          cp resources/date.png out/production/
          cp resources/Snake.png out/production/
          cd out/production && jar cfm "../artifacts/RamadanSnake.jar" "../../resources/META-INF/MANIFEST.MF" .

      - name: 4A. Package Windows (.exe)
        if: matrix.os == 'windows-latest'
        run: |
          jpackage --type exe --name RamadanSnake --input out/artifacts --main-jar RamadanSnake.jar --main-class Main --icon resources/Snakeico.ico --win-shortcut --win-menu

      - name: 4B. Package Linux (.deb and .rpm)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot
          jpackage --type deb --name RamadanSnake --input out/artifacts --main-jar RamadanSnake.jar --main-class Main
          jpackage --type rpm --name RamadanSnake --input out/artifacts --main-jar RamadanSnake.jar --main-class Main

      - name: 4C. Package Mac (.dmg)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p resources/Snake.iconset
          sips -z 16 16     resources/Snake.png --out resources/Snake.iconset/icon_16x16.png
          sips -z 32 32     resources/Snake.png --out resources/Snake.iconset/icon_32x32.png
          sips -z 128 128   resources/Snake.png --out resources/Snake.iconset/icon_128x128.png
          sips -z 256 256   resources/Snake.png --out resources/Snake.iconset/icon_256x256.png
          sips -z 512 512   resources/Snake.png --out resources/Snake.iconset/icon_512x512.png
          iconutil -c icns resources/Snake.iconset -o resources/Snake.icns
          jpackage --type dmg --name RamadanSnake --input out/artifacts --main-jar RamadanSnake.jar --main-class Main --icon resources/Snake.icns

      - name: 5. Upload Installers
        uses: actions/upload-artifact@v4
        with:
          name: RamadanSnake-${{ matrix.os }}
          path: |
            *.exe
            *.deb
            *.rpm
            *.dmg